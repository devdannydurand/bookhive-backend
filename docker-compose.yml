version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: bookhive-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: PLACE_YOUR_PASSWORD_HERE
      MYSQL_DATABASE: diw
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: